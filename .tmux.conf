# Прозрачность
set -g status-style "bg=default,fg=#DCD7BA"  # Цвета Kanagawa
set -g window-style "bg=default"
set -g window-active-style "bg=default"

# Цвета панелей (как в Kanagawa)
set -g pane-border-style "fg=#54546D"  # Цвет границы
set -g pane-active-border-style "fg=#7E9CD8"  # Активная граница (синий Kanagawa)

set -g status-left "#[fg=#7E9CD8,bold]#S "
set -g status-right ""

# Вкладки сверху (как в браузере)
set-option -g status-position top

# Нумерация окон/панелей с 1 (а не с 0)
set -g base-index 1          # Окна начинаются с 1
set -g pane-base-index 1     # Панели начинаются с 1
set-window-option -g pane-base-index 1

# Навигация между панелями на hjkl (без префикса!)
bind -r h select-pane -L  # Влево
bind -r j select-pane -D  # Вниз
bind -r k select-pane -U  # Вверх
bind -r l select-pane -R  # Вправо

# Навигация между окнами на Alt+цифра (Alt+1, Alt+2...)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
# ...добавьте для других окон по аналогии

# Ресайз панелей (удерживая Ctrl+Alt)
bind -r C-S-h resize-pane -L 2  # Шире влево
bind -r C-S-j resize-pane -D 2  # Выше вниз
bind -r C-S-k resize-pane -U 2  # Уже вверх
bind -r C-S-l resize-pane -R 2  # Уже вправо

# Новые горячие клавиши (Ctrl+Shift)
bind -n C-S-c new-window     # Ctrl+Shift+C — новое окно
bind -n C-S-x kill-window    # Ctrl+Shift+X — закрыть окно
