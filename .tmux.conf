set -g prefix C-Space
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',*:Tc'  # <== ВАЖНО для truecolor

set-option -g status-bg black
set-option -g status-fg white
set -g status-left "#[fg=white,bold]#S "
set -g status-right ""
set-option -g status-position top

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi

bind r source-file ~/.tmux.conf

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2

bind -r C-S-h resize-pane -L 2
bind -r C-S-j resize-pane -D 2
bind -r C-S-k resize-pane -U 2
bind -r C-S-l resize-pane -R 2

bind -n C-S-c new-window
bind -n C-S-x kill-window

