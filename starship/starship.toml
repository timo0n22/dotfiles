"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](sapphire)\
$os\
$username\
[](bg:mauve fg:sapphire)\
$directory\
[](bg:green fg:mauve)\
$git_branch\
$git_status\
[](fg:green bg:sky)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:sky bg:lavender)\
$time\
[ ](fg:lavender)\
$cmd_duration\
$line_break
$character"""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:sapphire fg:crust"

[os.symbols]
Windows = ""
Ubuntu = "ůįēą"
SUSE = ""
Raspbian = "ůįźŅ"
Mint = "ůį£≠"
Macos = "ůįÄĶ"
Manjaro = ""
Linux = "ůįĆĹ"
Gentoo = "ůį£®"
Fedora = "ůį£õ"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "ůį£á"
Artix = "ůį£á"
CentOS = ""
Debian = "ůį£ö"
Redhat = "ůĪĄõ"
RedHatEnterprise = "ůĪĄõ"

[username]
show_always = false
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:mauve fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = " "
"Music" = "ůįĚö "
"Pictures" = " "
"Developer" = "ůį≤č "

[git_branch]
symbol = ""
style = "bg:green"
format = '[[ $symbol $branch ](fg:crust bg:green)]($style)'

[git_status]
style = "bg:green"
format = '[[($all_status$ahead_behind )](fg:crust bg:green)]($style)'

[nodejs]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sky)]($style)'

[c]
symbol = " "
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sky)]($style)'

[rust]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sky)]($style)'

[golang]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sky)]($style)'

[php]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sky)]($style)'

[java]
symbol = "sapphire"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:sky)]($style)'

[kotlin]
symbol = "sapphire"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:sky)]($style)'

[haskell]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sky)]($style)'

[python]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:sky)]($style)'

[docker_context]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sky)]($style)'

[time]
disabled = false
time_format = "%I:%M"
style = "bg:lavender"
format = '[[  $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:mauve)'
error_symbol = '[‚ĚĮ](bold fg:mauve)'
vimcmd_symbol = '[‚Ěģ](bold fg:mauve)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:mauve)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:mauve)'
vimcmd_visual_symbol = '[V](bold fg:mauve)'

[cmd_duration]
show_milliseconds = true
format = " in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
