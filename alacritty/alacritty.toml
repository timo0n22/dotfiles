[window]
  opacity = 0.2
  blur = true
  startup_mode = "Maximized"
  title = "buba"
  decorations = "Buttonless"
[font]
normal = { family = "Hack Nerd Font Mono", style = "Regular"}
  size = 22
# Colors (Gruvbox Material Hard Dark)

# Default colors
[colors.primary]
background = '#1F1F28'
foreground = '#DCD7BA'

[colors]
transparent_background_colors = true

# Normal colors
[colors.normal]
black   = '#32302f'
red     = '#ea6962'
green   = '#a9b665'
yellow  = '#d8a657'
blue    = '#7daea3'
magenta = '#d3869b'
cyan    = '#89b482'
white   = '#d4be98'

# Bright colors (same as normal colors)
[colors.bright]
black   = '#32302f'
red     = '#ea6962'
green   = '#a9b665'
yellow  = '#d8a657'
blue    = '#7daea3'
magenta = '#d3869b'
cyan    = '#89b482'
white   = '#d4be98'
